name: iOS Simulator Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 40
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: apps/mobile-expo
        run: |
          set -x
          node -v
          npm -v
          # Use --ignore-scripts + --legacy-peer-deps to avoid @qvac/sdk peer dep conflict
          npm install --no-save --ignore-scripts --legacy-peer-deps
          node scripts/patch-bare-kit.js
          node scripts/patch-qvac-sdk.js

      - name: Check CocoaPods
        run: |
          which pod || echo "CocoaPods not found"
          pod --version || true

      - name: Prebuild iOS
        working-directory: apps/mobile-expo
        run: |
          npx expo prebuild --platform ios --verbose 2>&1 | tee prebuild.log || {
            echo "### expo prebuild failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -n 200 prebuild.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          }

      - name: List Xcode schemes
        working-directory: apps/mobile-expo/ios
        run: xcodebuild -list

      - name: Build iOS simulator app
        working-directory: apps/mobile-expo/ios
        run: |
          xcodebuild \
            -workspace Chimera.xcworkspace \
            -scheme Chimera \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild.log || {
              echo "### xcodebuild failed" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              tail -n 300 xcodebuild.log >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              exit 1
            }

      - name: Package .app for Appetize
        id: package
        working-directory: apps/mobile-expo/ios
        run: |
          set -x
          APP_PATH="./DerivedData/Build/Products/Release-iphonesimulator/Chimera.app"
          echo "Expected app path: $APP_PATH" | tee package-debug.log
          ls -ld "$APP_PATH" | tee -a package-debug.log || {
            echo "=== Searching for any .app bundle ===" | tee -a package-debug.log
            find ./DerivedData -name "*.app" -type d | tee -a package-debug.log || true
            echo "=== Build/Products contents ===" | tee -a package-debug.log
            find ./DerivedData/Build/Products -maxdepth 3 -type d 2>/dev/null | sort | tee -a package-debug.log || true
            echo "ERROR: Chimera.app not found at expected path" | tee -a package-debug.log
            exit 1
          }
          zip -r Chimera.app.zip "$APP_PATH" 2>&1 | tee -a package-debug.log

      - name: Commit debug log on failure
        if: failure() && steps.package.outcome == 'failure'
        run: |
          git config user.email "ci@example.com"
          git config user.name "GitHub Actions CI"
          git checkout --orphan ci-debug || git checkout ci-debug
          cp apps/mobile-expo/ios/package-debug.log package-debug.log
          git add package-debug.log
          git commit -m "CI packaging debug log" || true
          git push origin ci-debug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chimera-ios-app
          path: apps/mobile-expo/ios/Chimera.app.zip

      - name: Create GitHub Release and upload .app.zip
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd apps/mobile-expo/ios
          TAG="ios-build-${{ github.run_number }}"
          echo "Creating release $TAG"
          RELEASE_JSON=$(curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\":\"$TAG\",\"name\":\"iOS Simulator Build $TAG\",\"body\":\"iOS simulator .app for Appetize\"}")
          echo "Release response: $RELEASE_JSON"
          UPLOAD_URL=$(echo "$RELEASE_JSON" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('upload_url', '').replace('{?name,label}',''))")
          RELEASE_ID=$(echo "$RELEASE_JSON" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('id', ''))")
          echo "Upload URL: $UPLOAD_URL"
          echo "Release ID: $RELEASE_ID"
          if [ -z "$UPLOAD_URL" ]; then
            echo "Failed to create release"
            exit 1
          fi
          echo "Uploading asset..."
          curl -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/zip" \
            --data-binary @Chimera.app.zip \
            "$UPLOAD_URL?name=Chimera.app.zip"
          echo "Download URL: https://github.com/${{ github.repository }}/releases/download/$TAG/Chimera.app.zip"
          echo "### iOS Build Download" >> $GITHUB_STEP_SUMMARY
          echo "Download URL: https://github.com/${{ github.repository }}/releases/download/$TAG/Chimera.app.zip" >> $GITHUB_STEP_SUMMARY
