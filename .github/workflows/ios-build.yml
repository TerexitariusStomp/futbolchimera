name: iOS Simulator Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: apps/mobile-expo
        run: |
          set -x
          node -v
          npm -v
          # Use --ignore-scripts + --legacy-peer-deps to avoid @qvac/sdk peer dep conflict
          npm install --no-save --ignore-scripts --legacy-peer-deps
          node scripts/patch-bare-kit.js
          node scripts/patch-qvac-sdk.js

      - name: Check CocoaPods
        run: |
          which pod || echo "CocoaPods not found"
          pod --version || true

      - name: Prebuild iOS
        working-directory: apps/mobile-expo
        run: |
          npx expo prebuild --platform ios --verbose 2>&1 | tee prebuild.log || {
            echo "### expo prebuild failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -n 200 prebuild.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          }

      - name: List Xcode schemes
        working-directory: apps/mobile-expo/ios
        run: xcodebuild -list

      - name: Build iOS simulator app
        working-directory: apps/mobile-expo/ios
        run: |
          xcodebuild \
            -workspace Chimera.xcworkspace \
            -scheme Chimera \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild.log || {
              echo "### xcodebuild failed" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              tail -n 300 xcodebuild.log >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              exit 1
            }

      - name: Package .app for Appetize
        working-directory: apps/mobile-expo/ios
        run: |
          echo "Searching for Chimera.app..."
          find ./DerivedData -name "Chimera.app" -type d
          APP_PATH=$(find ./DerivedData -name "Chimera.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Chimera.app not found"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          zip -r Chimera.app.zip "$APP_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Chimera-ios-app
          path: apps/mobile-expo/ios/Chimera.app.zip
