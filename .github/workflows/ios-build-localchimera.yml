name: LocalChimera iOS Simulator Build

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/mobile-localchimera/**'
      - '.github/workflows/ios-build-localchimera.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: apps/mobile-localchimera/node_modules
          key: ${{ runner.os }}-node-localchimera-${{ hashFiles('apps/mobile-localchimera/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-localchimera-

      - name: Install dependencies
        working-directory: apps/mobile-localchimera
        run: |
          set -x
          node -v
          npm -v
          npm install --no-save --ignore-scripts --legacy-peer-deps
          node scripts/patch-bare-kit.js
          node scripts/patch-qvac-sdk.js
          node scripts/patch-expo-device.js

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            apps/mobile-localchimera/ios/Pods
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-pods-localchimera-${{ hashFiles('apps/mobile-localchimera/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-localchimera-

      - name: Check CocoaPods
        run: |
          which pod || echo "CocoaPods not found"
          pod --version || true

      - name: Prebuild iOS
        working-directory: apps/mobile-localchimera
        run: |
          npx expo prebuild --platform ios --verbose 2>&1 | tee prebuild.log || {
            echo "### expo prebuild failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -n 200 prebuild.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          }

      - name: Install CocoaPods
        working-directory: apps/mobile-localchimera/ios
        run: pod install

      - name: Patch Pods sources
        working-directory: apps/mobile-localchimera
        run: node scripts/patch-pods.js

      - name: Remove arm64 device capability
        working-directory: apps/mobile-localchimera/ios/LocalChimera
        run: |
          sed -i '' '/<key>UIRequiredDeviceCapabilities<\/key>/,/<\/array>/d' Info.plist || true
          cat Info.plist | grep "UIRequiredDeviceCapabilities" || echo "UIRequiredDeviceCapabilities removed"

      - name: List Xcode schemes
        working-directory: apps/mobile-localchimera/ios
        run: xcodebuild -list

      - name: Build iOS simulator app
        working-directory: apps/mobile-localchimera/ios
        run: |
          set -o pipefail
          xcodebuild \
            -workspace LocalChimera.xcworkspace \
            -scheme LocalChimera \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee xcodebuild.log
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -ne 0 ]; then
            echo "### xcodebuild failed" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -n 300 xcodebuild.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $EXIT
          fi

      - name: Package .app for Appetize
        id: package
        working-directory: apps/mobile-localchimera/ios
        run: |
          set -eux
          APP_PATH="DerivedData/Build/Products/Release-iphonesimulator/LocalChimera.app"
          echo "Expected app path: $APP_PATH" | tee package-debug.log
          if [ ! -d "$APP_PATH" ]; then
            echo "=== Searching for any .app bundle ===" | tee -a package-debug.log
            find DerivedData -name "*.app" -type d | tee -a package-debug.log || true
            echo "=== Build/Products contents ===" | tee -a package-debug.log
            find DerivedData/Build/Products -maxdepth 3 -type d 2>/dev/null | sort | tee -a package-debug.log || true
            echo "ERROR: LocalChimera.app not found at expected path" | tee -a package-debug.log
            exit 1
          fi
          ABS_PATH="$(cd "$(dirname "$APP_PATH")" && pwd)/$(basename "$APP_PATH")"
          echo "Absolute app path: $ABS_PATH" | tee -a package-debug.log
          zip -r LocalChimera.app.zip "$ABS_PATH" | tee -a package-debug.log
          echo "Created LocalChimera.app.zip size: $(stat -f%z LocalChimera.app.zip 2>/dev/null || stat -c%s LocalChimera.app.zip 2>/dev/null) bytes" | tee -a package-debug.log
          ls -lh LocalChimera.app.zip | tee -a package-debug.log

      - name: Commit debug log on failure
        if: failure()
        run: |
          git config user.email "ci@example.com"
          git config user.name "GitHub Actions CI"
          git checkout --orphan ci-debug-localchimera || git checkout ci-debug-localchimera
          if [ -f apps/mobile-localchimera/ios/package-debug.log ]; then
            cp apps/mobile-localchimera/ios/package-debug.log package-debug.log
            git add package-debug.log
          fi
          if [ -f apps/mobile-localchimera/ios/xcodebuild.log ]; then
            cp apps/mobile-localchimera/ios/xcodebuild.log xcodebuild.log
            git add xcodebuild.log
          fi
          if [ -f apps/mobile-localchimera/prebuild.log ]; then
            cp apps/mobile-localchimera/prebuild.log prebuild.log
            git add prebuild.log
          fi
          git commit -m "LocalChimera CI debug logs" || true
          git push origin ci-debug-localchimera

      - name: Upload build logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs-localchimera
          path: |
            apps/mobile-localchimera/ios/xcodebuild.log
            apps/mobile-localchimera/prebuild.log
            apps/mobile-localchimera/ios/package-debug.log

      - name: Annotate build failure
        if: failure()
        run: |
          python3 - <<'PY'
          import os, re
          log_path = 'apps/mobile-localchimera/ios/xcodebuild.log'
          if not os.path.exists(log_path):
              print('::error::xcodebuild.log not found')
          else:
              size = os.path.getsize(log_path)
              print(f'::error::xcodebuild.log size={size} bytes')
              patterns = [r': error:', r': fatal error:', r'FAILED', r'\*\* BUILD', r'error\[', r'Build failed', r'The following build commands failed', r'Uncaught exception', r'Failed to get the SHA-1']
              hits = []
              lines = []
              with open(log_path, 'rb') as f:
                  for raw in f:
                      line = raw.decode('utf-8', errors='replace').rstrip('\n')
                      lines.append(line)
                      if any(re.search(p, line) for p in patterns):
                          hits.append(line)
              print(f'::error::{len(hits)} matching lines')
              if hits:
                  tail = '\n'.join(hits[-30:])
              else:
                  tail = '\n'.join(lines[-30:])
              msg = tail.replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A')
              print(f'::error::xcodebuild tail:%0A{msg}')
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalChimera-ios-app
          path: apps/mobile-localchimera/ios/LocalChimera.app.zip

      - name: Upload to Appetize
        if: success()
        run: |
          cd apps/mobile-localchimera/ios
          APPETIZE_TOKEN="${{ secrets.APPETIZE_TOKEN }}"
          APPETIZE_PUBLIC_KEY="${{ secrets.APPETIZE_LOCALCHIMERA_PUBLIC_KEY }}"
          if [ -z "$APPETIZE_TOKEN" ]; then
            echo "APPETIZE_TOKEN secret not set. Skipping Appetize upload."
            exit 0
          fi
          if [ -z "$APPETIZE_PUBLIC_KEY" ]; then
            echo "APPETIZE_LOCALCHIMERA_PUBLIC_KEY not set. Creating new app on Appetize."
            RESPONSE=$(curl -s -X POST \
              https://api.appetize.io/v1/apps \
              -H "X-API-KEY: $APPETIZE_TOKEN" \
              -F "file=@LocalChimera.app.zip" \
              -F "platform=ios")
          else
            echo "Updating existing app $APPETIZE_PUBLIC_KEY on Appetize."
            RESPONSE=$(curl -s -X POST \
              "https://api.appetize.io/v1/apps/$APPETIZE_PUBLIC_KEY" \
              -H "X-API-KEY: $APPETIZE_TOKEN" \
              -F "file=@LocalChimera.app.zip" \
              -F "platform=ios")
          fi
          echo "Appetize response: $RESPONSE"
          echo '### Appetize Upload' >> $GITHUB_STEP_SUMMARY
          echo "Response: $RESPONSE" >> $GITHUB_STEP_SUMMARY
          PUBLICKEY=$(echo "$RESPONSE" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('publicKey',''))")
          if [ -n "$PUBLICKEY" ]; then
            echo "Appetize URL: https://appetize.io/app/$PUBLICKEY"
            echo "Appetize URL: https://appetize.io/app/$PUBLICKEY" >> $GITHUB_STEP_SUMMARY
          fi
